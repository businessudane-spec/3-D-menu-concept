<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Bites | Interactive 3D Culinary Experience</title>
    <meta name="description" content="Explore and order from our premium interactive 3D menu with gourmet burgers, luxury sushi, tonkotsu ramen, and fine desserts.">
    <link rel="stylesheet" href="index.css">
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '10px';
            errorDiv.style.left = '10px';
            errorDiv.style.background = 'rgba(255, 0, 0, 0.9)';
            errorDiv.style.color = '#fff';
            errorDiv.style.padding = '15px';
            errorDiv.style.zIndex = '9999';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.borderRadius = '8px';
            errorDiv.style.border = '2px solid white';
            errorDiv.style.maxWidth = '90vw';
            errorDiv.style.wordBreak = 'break-all';
            errorDiv.innerHTML = '<strong>JS Error:</strong> ' + message + '<br>Line: ' + lineno + ':' + colno + '<br>Source: ' + source;
            document.body.appendChild(errorDiv);
        };
    </script>
</head>
<body>
    <div class="bg-ambient"></div>
    <div class="glow-orb" id="glowOrb"></div>

    <header>
        <div class="logo">
            <h1>Stellar Bites</h1>
        </div>
        <nav class="categories">
            <button class="category-btn active" data-category="all">All Items</button>
            <button class="category-btn" data-category="mains">Mains</button>
            <button class="category-btn" data-category="specialties">Specialties</button>
            <button class="category-btn" data-category="desserts">Desserts</button>
        </nav>
        <button class="cart-icon-btn" id="openCartBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            Cart (<span id="cartCount">0</span>)
        </button>
    </header>

    <main class="main-container">
        <!-- Left Column: Details -->
        <section class="info-panel">
            <div class="glass-card" id="detailCard">
                <div class="dish-details">
                    <div class="tag-list">
                        <span class="tag" id="dishCategory">Mains</span>
                        <span class="tag" id="dishRating">★ 4.9</span>
                    </div>
                    <h2 class="dish-title" id="dishTitle">Zen Burger</h2>
                    <p class="dish-desc" id="dishDesc">Signature premium wagyu beef, caramelized onions, truffle aioli, aged cheddar, toasted brioche bun.</p>
                    
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-val" id="statCalories">850</span>
                            <span class="stat-lbl">Calories</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-val" id="statWeight">340g</span>
                            <span class="stat-lbl">Weight</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-val" id="statPrep">12m</span>
                            <span class="stat-lbl">Prep Time</span>
                        </div>
                    </div>

                    <div class="price-container">
                        <span class="price" id="dishPrice">18.99</span>
                        <button class="add-btn" id="addToCartBtn">Add to Order</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Center Column: 3D Scene Viewport -->
        <section class="canvas-container">
            <canvas id="canvas3d"></canvas>
            <div class="instructions">
                <div class="instructions-dot"></div>
                Drag to rotate. Scroll to zoom.
            </div>
        </section>

        <!-- Right Column: Interactive Menu List -->
        <section class="items-panel" id="itemsPanel">
            <!-- Dynamic Menu Cards loaded by JS -->
        </section>
    </main>

    <!-- Shopping Cart Sidebar Drawer -->
    <div class="cart-panel" id="cartPanel">
        <div class="cart-header">
            <h2>Your Order</h2>
            <button class="close-cart" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Dynamic Cart Items loaded by JS -->
            <p style="text-align: center; color: var(--text-secondary); margin-top: 40px;">Your cart is empty</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Subtotal</span>
                <span>$<span id="cartSubtotal">0.00</span></span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">Place Order</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
